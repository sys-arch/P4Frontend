<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<div class="ausencias">
    <!-- Header de Ausencias -->
    <div class="header">
      <img src="assets/images/reuneme.png" class="logo-img" alt="ReuneMe Logo">
    </div>
    
    <h2>Ausencias</h2>
  
    <!-- Contenido de las ausencias -->
    <div class="ausencias-content">
      <div class="ausencias-list">
        <div class="ausencia" *ngFor="let ausencia of ausencias">
          <div class="ausencia-info">
            <!-- Mostrar las fechas de inicio y fin -->
            <div class="ausencia-date">
              <span>Desde: {{ ausencia.fechaInicio }}</span> <br>
              <span>Hasta: {{ ausencia.fechaFin }}</span>
            </div>
            <div class="ausencia-reason">{{ ausencia.motivo }}</div>
          </div>
          <div class="ausencia-actions">
            <button class="action-btn delete-btn" title="Eliminar" (click)="toggleDelete(ausencia)">
              <i class="material-icons">delete</i>
            </button>
          </div>
        </div>
      </div>
    </div>
  
    <!-- Footer -->
    <footer class="footer">
      <div class="footer-content">
        <ul class="footer-links">
          <li><a href="#">Condiciones de Uso</a></li>
          <li><a href="#">Política de Privacidad</a></li>
          <li><a href="#">Consentimiento de Cookies</a></li>
        </ul>
      </div>
    </footer>
  
    <div class="footer-info">
      <span>© 2024 ReuneMe, LLC</span>
    </div>
</div>
